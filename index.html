<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24th Annual Big Daddy Seed Pool 2026</title>
<style>
:root {
  --bg: #0f1923;
  --card: #1a2736;
  --card2: #223344;
  --accent: #f59e0b;
  --accent2: #3b82f6;
  --green: #22c55e;
  --red: #ef4444;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: #334155;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.header { background: linear-gradient(135deg, #1e3a5f 0%, #0f1923 100%); padding:24px 32px; border-bottom:3px solid var(--accent); text-align:center; }
.header h1 { font-size:28px; font-weight:800; letter-spacing:1px; }
.header h1 span { color:var(--accent); }
.header .subtitle { color:var(--muted); font-size:14px; margin-top:4px; }
.tier-tabs { display:flex; justify-content:center; gap:8px; padding:16px; background:var(--card); border-bottom:1px solid var(--border); }
.tier-tab { padding:10px 32px; border-radius:8px; cursor:pointer; font-weight:700; font-size:15px; border:2px solid var(--border); background:transparent; color:var(--muted); transition:all .2s; }
.tier-tab:hover { border-color:var(--accent); color:var(--text); }
.tier-tab.active { background:var(--accent); color:#000; border-color:var(--accent); }
.tier-tab .count { font-size:11px; font-weight:400; opacity:.8; display:block; }
.container { max-width:1400px; margin:0 auto; padding:16px; }
.stats-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:12px; margin-bottom:16px; }
.stat-card { background:var(--card); border-radius:10px; padding:16px; text-align:center; border:1px solid var(--border); }
.stat-card .label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
.stat-card .value { font-size:28px; font-weight:800; color:var(--accent); margin-top:4px; }
.section-title { font-size:18px; font-weight:700; margin:20px 0 12px; display:flex; align-items:center; gap:8px; }
.section-title::before { content:''; width:4px; height:20px; background:var(--accent); border-radius:2px; }

/* Admin Panel */
.admin-toggle { background:var(--card2); border:1px solid var(--border); padding:10px 20px; border-radius:8px; color:var(--accent); cursor:pointer; font-size:13px; font-weight:600; margin-bottom:12px; }
.admin-panel { background:var(--card); border:1px solid var(--accent); border-radius:10px; padding:20px; margin-bottom:16px; display:none; }
.admin-panel.show { display:block; }
.admin-panel h3 { color:var(--accent); margin-bottom:12px; font-size:16px; }
.round-section { margin-bottom:16px; }
.round-section h4 { color:var(--accent2); margin-bottom:8px; font-size:14px; }
.game-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:8px; }
.game-btn { display:flex; align-items:center; gap:6px; padding:8px 12px; border-radius:6px; border:1px solid var(--border); background:var(--card2); cursor:pointer; font-size:13px; color:var(--text); transition:all .15s; }
.game-btn:hover { border-color:var(--accent); }
.game-btn.won { background:#166534; border-color:var(--green); }
.game-btn.lost { background:#7f1d1d; border-color:var(--red); opacity:.5; }
.game-btn .seed-num { background:var(--accent); color:#000; border-radius:4px; padding:1px 6px; font-weight:700; font-size:11px; min-width:22px; text-align:center; }
.admin-actions { display:flex; gap:8px; margin-top:12px; }
.admin-actions button { padding:8px 16px; border-radius:6px; border:none; cursor:pointer; font-weight:600; font-size:13px; }
.btn-save { background:var(--green); color:#fff; }
.btn-reset { background:var(--red); color:#fff; }

/* Leaderboard */
.leaderboard { width:100%; border-collapse:separate; border-spacing:0; }
.leaderboard th { background:var(--card2); padding:10px 12px; font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); text-align:left; position:sticky; top:0; z-index:2; }
.leaderboard td { padding:8px 12px; border-bottom:1px solid var(--border); font-size:13px; }
.leaderboard tr:hover td { background:rgba(245,158,11,.05); }
.leaderboard .rank { font-weight:800; color:var(--accent); width:40px; text-align:center; }
.leaderboard .rank-1 { font-size:18px; }
.leaderboard .name { font-weight:600; max-width:180px; }
.leaderboard .pts { font-weight:800; color:var(--green); font-size:16px; text-align:right; }
.leaderboard .alive { color:var(--accent2); text-align:center; }
.leaderboard .elim { color:var(--red); text-align:center; }
.leaderboard .potential { color:var(--muted); text-align:right; font-size:12px; }
.leaderboard .odds { font-weight:700; font-size:14px; text-align:right; white-space:nowrap; }
.odds-fav { color:var(--green); }
.odds-long { color:var(--accent); }
.odds-dead { color:var(--red); opacity:.6; }
.odds-bar { display:inline-block; height:14px; background:linear-gradient(90deg, var(--accent), var(--accent2)); border-radius:3px; margin-right:6px; vertical-align:middle; min-width:2px; }
.sim-note { font-size:11px; color:var(--muted); margin-top:4px; font-style:italic; }
.pick-cell { font-size:12px; padding:4px 6px !important; text-align:center; white-space:nowrap; }
.pick-cell.win { background:rgba(34,197,94,.15); color:var(--green); font-weight:600; }
.pick-cell.loss { background:rgba(239,68,68,.1); color:var(--red); text-decoration:line-through; opacity:.6; }
.pick-cell.pending { color:var(--muted); }

/* Table wrapper */
.table-wrap { overflow-x:auto; border-radius:10px; border:1px solid var(--border); background:var(--card); margin-bottom:24px; }
.table-wrap::-webkit-scrollbar { height:8px; }
.table-wrap::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* Search/filter */
.controls { display:flex; gap:12px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
.search-box { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 14px; color:var(--text); font-size:14px; width:260px; }
.search-box:focus { outline:none; border-color:var(--accent); }
.view-toggle { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.view-toggle button { padding:8px 14px; background:var(--card); color:var(--muted); border:none; cursor:pointer; font-size:13px; }
.view-toggle button.active { background:var(--accent); color:#000; font-weight:600; }

/* Responsive */
@media(max-width:768px) {
  .header h1 { font-size:20px; }
  .container { padding:8px; }
  .stats-row { grid-template-columns:repeat(2,1fr); }
  .tier-tab { padding:8px 16px; font-size:13px; }
  .search-box { width:100%; }
}

/* Print */
@media print {
  body { background:#fff; color:#000; }
  .admin-toggle, .admin-panel, .controls { display:none !important; }
  .header { background:#fff; border-bottom:2px solid #000; }
  .header h1, .header h1 span { color:#000; }
}
</style>
</head>

// Map variant spellings
function normalizeTeam(t) {
  if (!t) return t;
  const map = {
    "Liu": "LIU",
    "NC State/Texas Winner": "Texas",
    "SMU/Miami OH Winner": "Miami OH"
  };
  return map[t] || t;
}

// ============ SCORING ============
const ROUND_BONUS = { 1:0, 2:2, 3:4, 4:6, 5:8, 6:10 };
const ROUND_NAMES = { 1:"Round of 64", 2:"Round of 32", 3:"Sweet 16", 4:"Elite 8", 5:"Final Four", 6:"Championship" };

// Max possible rounds a team can win (6 total games in tournament)
const MAX_ROUNDS = 6;

function getTeamStatus(team) {
  const t = normalizeTeam(team);
  return RESULTS[t] || {status:"pending"};
}

function calcPoints(picks) {
  let total = 0;
  for (const [seedStr, team] of Object.entries(picks)) {
    const seed = parseInt(seedStr);
    const info = getTeamStatus(team);
    if (info.status === "won") {
      // Points for each round won so far
      for (let r = 1; r <= (info.round || 1); r++) {
        total += seed + ROUND_BONUS[r];
      }
    }
  }
  return total;
}

function calcAlive(picks) {
  let alive = 0, eliminated = 0;
  for (const [, team] of Object.entries(picks)) {
    const s = getTeamStatus(team).status;
    if (s === "lost") eliminated++;
    else alive++;
  }
  return { alive, eliminated };
}

function calcMaxPotential(picks) {
  let total = calcPoints(picks);
  for (const [seedStr, team] of Object.entries(picks)) {
    const seed = parseInt(seedStr);
    const info = getTeamStatus(team);
    if (info.status === "lost") continue;
    // Add future potential rounds
    const currentRound = info.status === "won" ? (info.round || 1) : 0;
    for (let r = currentRound + 1; r <= MAX_ROUNDS; r++) {
      total += seed + ROUND_BONUS[r];
    }
  }
  return total;
}

// ============ POWER RATING WIN ODDS ============
// Uses a strength-based model: calculates each entry's expected final score,
// then converts to a probability distribution using a softmax with temperature
// tuned to the pool size. Produces sportsbook-style odds.

let cachedOdds = {};
let oddsNeedRecalc = true;
let _seedMap = null;

function getSeedForTeam(team) {
  if (!_seedMap) {
    _seedMap = {};
    for (const tier of Object.values(POOL_DATA)) {
      for (const entry of tier) {
        for (const [seedStr, t] of Object.entries(entry.picks)) {
          _seedMap[normalizeTeam(t)] = parseInt(seedStr);
        }
      }
    }
  }
  return _seedMap[team] || _seedMap[normalizeTeam(team)] || null;
}

// Expected additional wins per seed (weighted avg remaining games a team of this seed will win)
const SEED_EXP_WINS = {
  1: 3.5, 2: 2.8, 3: 2.2, 4: 1.8, 5: 1.3, 6: 1.2,
  7: 1.1, 8: 0.9, 9: 0.9, 10: 0.7, 11: 0.6, 12: 0.5,
  13: 0.25, 14: 0.15, 15: 0.07, 16: 0.02
};

function calcExpectedScore(picks) {
  let total = calcPoints(picks); // locked-in points
  for (const [seedStr, team] of Object.entries(picks)) {
    const seed = parseInt(seedStr);
    const info = getTeamStatus(team);
    if (info.status === "lost") continue;
    const currentRound = info.status === "won" ? (info.round || 1) : 0;
    const expWins = SEED_EXP_WINS[seed] || 0.5;
    // Scale expected future wins based on how far they've already gone
    const remainingRounds = MAX_ROUNDS - currentRound;
    const futureWins = Math.min(expWins, remainingRounds);
    // Expected points from future wins (avg bonus across likely rounds)
    for (let w = 0; w < futureWins; w++) {
      const futureRound = currentRound + 1 + w;
      if (futureRound > MAX_ROUNDS) break;
      // Weight by probability of reaching this round (decays)
      const reachProb = Math.pow(expWins / remainingRounds, w * 0.3);
      total += (seed + ROUND_BONUS[futureRound]) * reachProb;
    }
  }
  return total;
}

function calcWinOdds(tierKey) {
  const entries = POOL_DATA[tierKey];
  // Calculate expected scores
  const expScores = entries.map(e => calcExpectedScore(e.picks));
  const maxExp = Math.max(...expScores);
  const minExp = Math.min(...expScores);
  const range = maxExp - minExp || 1;

  // Temperature controls how spread out the odds are
  // Lower temp = more concentrated on favorites
  // Scale with pool size: bigger pool = slightly higher temp
  const temp = range * 0.12;

  // Softmax to convert expected scores to probabilities
  const exps = expScores.map(s => Math.exp((s - maxExp) / (temp || 1)));
  const sumExp = exps.reduce((a, b) => a + b, 0);
  const probs = exps.map(e => e / sumExp);

  const odds = {};
  for (let i = 0; i < entries.length; i++) {
    odds[entries[i].name] = probs[i] * 100;
  }
  return odds;
}

function getOddsForTier(tierKey) {
  if (!cachedOdds[tierKey] || oddsNeedRecalc) {
    cachedOdds[tierKey] = calcWinOdds(tierKey);
  }
  return cachedOdds[tierKey];
}

    <div class="stat-card"><div class="label">Avg Score</div><div class="value">${avgPts}</div></div>
    <div class="stat-card"><div class="label">Games Decided</div><div class="value">${gamesPlayed}</div></div>
    <div class="stat-card"><div class="label">Entries</div><div class="value">${entries.length}</div></div>
  `;
}

function renderLeaderboard() {
  const entries = POOL_DATA[currentTier];
  const search = document.getElementById("searchBox").value.toLowerCase();
  const odds = getOddsForTier(currentTier);
  let scores = entries.map(e => {
    const { alive, eliminated } = calcAlive(e.picks);
    return { name:e.name, picks:e.picks, pts:calcPoints(e.picks), alive, eliminated, max:calcMaxPotential(e.picks), odds: odds[e.name] || 0 };
  });
  scores.sort((a,b) => b.pts - a.pts || b.max - a.max);

  // Assign ranks (handle ties)
  let rank = 1;
  for (let i = 0; i < scores.length; i++) {
    if (i > 0 && scores[i].pts === scores[i-1].pts) {
      scores[i].rank = scores[i-1].rank;
    } else {
      scores[i].rank = i + 1;
    }
  }

  if (search) {
    scores = scores.filter(e => e.name.toLowerCase().includes(search));
  }

  const table = document.getElementById("mainTable");

  if (currentView === "leaderboard") {
    const maxOdds = Math.max(...scores.map(e => e.odds), 0.01);
    let html = `<thead><tr>
      <th style="width:40px;text-align:center">Rank</th>
      <th>Entry</th>
      <th style="text-align:right">Points</th>
      <th style="text-align:right">Odds</th>
      <th style="text-align:center">Alive</th>
      <th style="text-align:center">Elim</th>
      <th style="text-align:right">Max Potential</th>
    </tr></thead><tbody>`;
    for (const e of scores) {
      const rc = e.rank <= 3 ? ` rank-${e.rank}` : "";
      const medal = e.rank === 1 ? "🥇" : e.rank === 2 ? "🥈" : e.rank === 3 ? "🥉" : "";
      const barW = Math.max(2, Math.round((e.odds / maxOdds) * 50));
      // Convert probability % to American odds
      const prob = e.odds / 100;
      let oddsStr, oddsClass;
      if (prob <= 0.001) {
        oddsStr = "+99999"; oddsClass = "odds-dead";
      } else if (prob >= 0.5) {
        const american = Math.round(-(prob / (1 - prob)) * 100);
        oddsStr = american.toLocaleString(); oddsClass = "odds-fav";
      } else {
        let american = Math.round(((1 - prob) / prob) * 100);
        if (american > 99999) american = 99999;
        oddsStr = "+" + american.toLocaleString(); oddsClass = american > 10000 ? "odds-dead" : "odds-long";
      }
      html += `<tr>
        <td class="rank${rc}">${medal || e.rank}</td>
        <td class="name">${e.name}</td>
        <td class="pts">${e.pts}</td>
        <td class="odds"><span class="odds-bar" style="width:${barW}px"></span><span class="${oddsClass}">${oddsStr}</span></td>
        <td class="alive">${e.alive}</td>
        <td class="elim">${e.eliminated}</td>
        <td class="potential">${e.max}</td>
      </tr>`;
    }
    html += `</tbody>`;
    html += `<tfoot><tr><td colspan="7" class="sim-note" style="padding:8px 12px">Odds based on power ratings using current points, team strength, and projected outcomes</td></tr></tfoot>`;
    table.innerHTML = html;
  } else {
    // Picks view
    let html = `<thead><tr>
      <th style="width:40px;text-align:center">#</th>
      <th>Entry</th>
      <th style="text-align:right;width:50px">Pts</th>`;
    for (let s = 1; s <= 16; s++) {
      html += `<th class="pick-cell" style="font-size:11px">${s} Seed</th>`;
    }
    html += "</tr></thead><tbody>";
    for (const e of scores) {
      html += `<tr><td class="rank">${e.rank}</td><td class="name">${e.name}</td><td class="pts">${e.pts}</td>`;
      for (let s = 1; s <= 16; s++) {
        const team = e.picks[String(s)];
        const info = getTeamStatus(team);
        let cls = "pending";
        if (info.status === "won") cls = "win";
        else if (info.status === "lost") cls = "loss";
        // Show abbreviated team name
        const short = team.length > 12 ? team.substring(0,11) + "…" : team;
        html += `<td class="pick-cell ${cls}" title="${team}">${short}</td>`;
      }
      html += "</tr>";
    }
    html += "</tbody>";
    table.innerHTML = html;
  }
}

function setView(view, btn) {
  currentView = view;
  document.querySelectorAll(".view-toggle button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderLeaderboard();
}

// ============ ADMIN ============
function toggleAdmin() {
  document.getElementById("adminPanel").classList.toggle("show");
  if (document.getElementById("adminPanel").innerHTML === "") renderAdmin();
}

function renderAdmin() {
  const panel = document.getElementById("adminPanel");
  const allTeams = {};
  for (const tier of Object.values(POOL_DATA)) {
    for (const entry of tier) {
      for (const [seed, team] of Object.entries(entry.picks)) {
        const t = normalizeTeam(team);
        if (!allTeams[seed]) allTeams[seed] = new Set();
        allTeams[seed].add(t);
      }
    }
  }

  let html = `<h3>Update Game Results</h3><p style="color:var(--muted);font-size:13px;margin-bottom:16px">Click a team to cycle: <span style="color:var(--muted)">Pending</span> → <span style="color:var(--green)">Won</span> → <span style="color:var(--red)">Lost</span> → Pending</p>`;

  // Group by seed
  for (let s = 1; s <= 16; s++) {
    const teams = allTeams[String(s)] ? [...allTeams[String(s)]].sort() : [];
    html += `<div class="round-section"><h4>Seed #${s}</h4><div class="game-grid">`;
    for (const team of teams) {
      const info = getTeamStatus(team);
      const cls = info.status === "won" ? "won" : info.status === "lost" ? "lost" : "";
      html += `<button class="game-btn ${cls}" data-team="${team}" onclick="cycleResult(this,'${team.replace(/'/g,"\\'")}',${s})">
        <span class="seed-num">${s}</span> ${team} ${info.status === "won" ? "✅" : info.status === "lost" ? "❌" : "⏳"}
        ${info.round ? `<span style="font-size:10px;color:var(--muted)">(R${info.round})</span>` : ""}
      </button>`;
    }
    html += "</div></div>";
  }

  html += `<div class="admin-actions">
    <button class="btn-save" onclick="exportResults()">📋 Copy Results JSON</button>
  </div>
  <div style="margin-top:12px">
    <label style="color:var(--muted);font-size:12px">Paste saved results JSON to restore:</label>
    <textarea id="importArea" style="width:100%;height:60px;background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:12px;margin-top:4px" placeholder="Paste JSON here..."></textarea>
    <button style="margin-top:4px;padding:6px 12px;background:var(--accent2);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px" onclick="importResults()">Import</button>
  </div>`;

  panel.innerHTML = html;
}

function cycleResult(btn, team, seed) {
  const info = RESULTS[team] || {status:"pending"};
  if (info.status === "pending") {
    RESULTS[team] = {status:"won", round:1};
  } else if (info.status === "won") {
    // Cycle through rounds, then to lost
    const nextRound = (info.round || 1) + 1;
    if (nextRound <= 6) {
      RESULTS[team] = {status:"won", round:nextRound};
    } else {
      RESULTS[team] = {status:"lost", round:6};
    }
  } else {
    RESULTS[team] = {status:"pending"};
  }
  // Save to localStorage & recalc odds
  localStorage.setItem("bigdaddy_results", JSON.stringify(RESULTS));
  oddsNeedRecalc = true;
  _seedMap = null;
  renderAdmin();
  renderStats();
  renderLeaderboard();
  oddsNeedRecalc = false;
}

function exportResults() {
  const json = JSON.stringify(RESULTS, null, 2);
  navigator.clipboard.writeText(json).then(() => alert("Results JSON copied to clipboard!"));
}

function importResults() {
  try {
    const json = document.getElementById("importArea").value;
    const imported = JSON.parse(json);
    Object.assign(RESULTS, imported);
    localStorage.setItem("bigdaddy_results", JSON.stringify(RESULTS));
    oddsNeedRecalc = true;
    _seedMap = null;
    renderAdmin();
    renderStats();
    renderLeaderboard();
    oddsNeedRecalc = false;
    alert("Results imported successfully!");
  } catch(e) {
    alert("Invalid JSON: " + e.message);
  }
}

// Load saved results from localStorage
function loadSavedResults() {
  try {
    const saved = localStorage.getItem("bigdaddy_results");
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.assign(RESULTS, parsed);
    }
  } catch(e) {}
}

// ============ INIT ============
function render() {
  renderTabs();
  renderStats();
  renderLeaderboard();
}

document.getElementById("lastUpdate").textContent = new Date().toLocaleString();
loadSavedResults();
render();
</script>
